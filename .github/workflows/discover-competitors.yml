name: Discover Competitors

on:
  workflow_dispatch:
    inputs:
      company_name:
        description: "Nom de l'entreprise à analyser"
        required: true
      request_id:
        description: "id de la ligne discovery_requests à mettre à jour (optionnel)"
        required: false
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Installer les dépendances
        run: pip install -r requirements.txt
      - name: Lancer la découverte
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OWNER_USER_ID: ${{ secrets.OWNER_USER_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COMPANY_NAME: ${{ inputs.company_name }}
          REQUEST_ID: ${{ inputs.request_id }}
        run: python discover.py
